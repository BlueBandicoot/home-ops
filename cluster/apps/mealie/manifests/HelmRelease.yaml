# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
  namespace: mealie
spec:
  chart:
    spec:
      chart: mealie
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: mealie
        namespace: flux-system
  dependsOn:
  - name: cnpg
  - name: rook-ceph
  interval: 1m0s
  values:
    strategy:
      type: Recreate
    controllers:
      main:
        enabled: true
        containers:
          main:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag:
              pullPolicy: IfNotPresent
            env:
              TZ: Europe/Brussels
    service:
      main:
        controller: main
        ports:
          http:
            port: 9000
    ingress:
      main:
        enabled: false
    persistence:
      data:
        enabled: true
        accessMode: ReadWriteOnce
        size: 10Gi
        advancedMounts:
          main:
            main:
            - path: /app/data/
              readOnly: false
    postgresql:
      enabled: false
      #  auth:
      #    postgresPassword: ""
      #    username: ""
      #    password: ""
      #    database: ""
      # persistence:
      #   enabled: true
      #   storageClass:
      #  accessModes:
      #     - ReadWriteOnce
